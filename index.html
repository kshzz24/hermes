<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsApp Clone</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="header">
    <div class="logo">WhatsApp</div>
    <div class="search">
      <input type="text" placeholder="Search chats" />
    </div>
  </header>

  <main class="chat-list">
    <div class="chat" data-id="1">
      <div class="chat-header">Chat 1</div>
      <div class="messages">
        <div class="message">Hey there!</div>
        <div class="message">How are you?</div>
      </div>
    </div>
    <!-- More chats can be added here -->
  </main>

  <footer class="footer">
    <input type="text" placeholder="Type a message..." />
    <button>Send</button>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
